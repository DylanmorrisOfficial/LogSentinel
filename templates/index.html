<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LogSentinel</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="container">
    
        <header>
    
            <h1>LogSentinel</h1>
    
            <p>Upload a log file to analyse for security threats.</p>
    
        </header>
    
        <div class="upload-card">
    
            <div class="card-header">
    
                <h2>
                    <i data-lucide="upload-cloud"></i>
                    Upload a log file
                </h2>
    
                <p>Choose a log file from your device to get started.</p>
    
            </div>     
            
            <form method="POST" action="/upload" enctype="multipart/form-data">
                <input type="file" name="logfile" id="logfile" hidden>
                    
                <label for="logfile" class="upload-box">
                    <i data-lucide="upload-cloud"></i>
                    <span>Choose a log file</span>
                </label>
                    
                <button type="submit">Upload</button>
            </form>

        </div>
    </div>
            
    <script>
        lucide.createIcons();
    </script>

</body>
</html>
