<!DOCTYPE html>

<html lang="en">
    
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LogSentinel - Dashboard</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>LogSentinel Dashboard</h1>

        <div class="stats">

            <div class="card">
                <h3>Total Events</h3>
                <p>{{ entries|length }}</p>
            </div>
        
            <div class="card">
                <h3>Total Alerts</h3>
                <p>{{ alerts|length }}</p>
            </div>
        
        </div>

        <table border="1">

            <tr>
                <th>Attack</th>
                <th>Severity</th>
                <th>User</th>
                <th>IP</th>
            </tr>
        
            {% for alert in alerts %}
        
            <tr>
                <td>{{ alert.alert_type }}</td>
                <td>
                    <span class="badge {{ alert.severity|lower }}">
                        {{ alert.severity }}
                    </span>
                </td>
                <td>{{ alert.user }}</td>
                <td>{{ alert.ip }}</td>
            </tr>
        
            {% endfor %}
        
        </table>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
